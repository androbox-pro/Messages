name: Android Build

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle packages
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build Core Release APK
        env:
          GRADLE_OPTS: "-Xmx3072m -Dorg.gradle.jvmargs=-Xmx3072m"
        run: ./gradlew assembleCoreRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Signed-Release-APK-core
          path: app/build/outputs/apk/core/release/*.apk